          <h1>Reverse Ishihara Test</h1>
          <p>
            This test uses reverse Ishihara plates: dot-pattern images with a
            digit hidden inside. Standard Ishihara plates show digits that are
            easy to read with typical color vision and hard to read with
            red-green colorblindness. Reverse plates invert that — the digit is
            easier to see for someone with a specific color vision deficiency
            and difficult or impossible to see for typical viewers.
          </p>
          <h2>Why reverse plates exist</h2>
          <p>
            Standard plates are easy to fail by simply saying "I don't see
            anything," which makes them weak evidence on their own when there
            is any motivation to claim color vision deficiency. Reverse plates
            flip the burden: someone who claims colorblindness should be able
            to read the matching plate. Used together, the two directions
            carry more evidence than either alone — a property used in some
            occupational and forensic screening for malingering.
          </p>
          <h2>How it works</h2>
          <p>
            Each plate is a circle of colored dots. Background dots are placed
            on a confusion line — colors that collapse into one shade for a
            specific deficiency (protanopia, deuteranopia, or tritanopia).
            Figure dots are offset perpendicular to that line, in chromatic
            dimensions the affected viewer can still discriminate. Trichromats
            see chromatic noise; dichromats see the digit.
          </p>
          <h2>What this is not</h2>
          <p>
            This is not a diagnostic test. Screens vary widely in how they
            reproduce color, ambient lighting matters, and a handful of plates
            on a webpage cannot substitute for clinical instruments like an
            anomaloscope or the HRR and Farnsworth tests. For a real
            evaluation, see an eye doctor.
          </p>
